<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Leave a Review – FoodOrder</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar">
  <a class="navbar-brand" th:href="@{/restaurants}">🍽️ <span>FoodOrder</span></a>
  <div class="nav-links">
    <a th:href="@{/orders}" class="nav-btn">📦 Orders</a>
    <form th:action="@{/logout}" method="post" class="d-inline">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button class="btn btn-outline-danger btn-sm">Logout</button>
        </form>
  </div>
</nav>

<div class="page-sm">
  <a th:href="@{/orders}" class="btn btn-ghost btn-sm mb-2">← Back to Orders</a>

  <div class="card mt-1">
    <div class="card-header">⭐ Review Order #<span th:text="${orderId}"></span></div>
    <div class="card-body">
      <div th:if="${success}" class="alert alert-success">✅ <span th:text="${success}"></span></div>

      <!-- Minor use case: Akshaya Lakshmi Narasimhan -->
      <form th:action="@{/orders/{id}/review(id=${orderId})}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="form-group">
          <label class="form-label">Your Rating</label>
          <div class="star-input">
            <input type="radio" id="s5" name="rating" value="5" required><label for="s5">★</label>
            <input type="radio" id="s4" name="rating" value="4"><label for="s4">★</label>
            <input type="radio" id="s3" name="rating" value="3"><label for="s3">★</label>
            <input type="radio" id="s2" name="rating" value="2"><label for="s2">★</label>
            <input type="radio" id="s1" name="rating" value="1"><label for="s1">★</label>
          </div>
        </div>
        <div class="form-group mt-2">
          <label class="form-label">Your Comment</label>
          <textarea name="comment" class="form-control" rows="4"
                    placeholder="How was your experience?" required></textarea>
        </div>
        <button type="submit" class="btn btn-primary btn-full mt-2">Submit Review</button>
      </form>
    </div>
  </div>

  <!-- Previous reviews -->
  <div class="card mt-2" th:if="${!#lists.isEmpty(reviews)}">
    <div class="card-header">💬 Previous Reviews</div>
    <div class="card-body">
      <div th:each="r : ${reviews}" style="border-bottom:1px solid var(--border); padding-bottom:1rem; margin-bottom:1rem;">
        <div class="d-flex justify-between align-center">
          <strong th:text="${r.customerName}"></strong>
          <span class="star-rating">
            <span th:each="i : ${#numbers.sequence(1, r.rating)}">★</span>
            <span th:each="i : ${#numbers.sequence(r.rating + 1, 5)}" style="color:#d1d5db;">★</span>
          </span>
        </div>
        <p class="text-sm mt-1" th:text="${r.comment}"></p>
        <p class="text-muted text-sm" th:text="${#temporals.format(r.createdAt,'dd MMM yyyy')}"></p>
      </div>
    </div>
  </div>
</div>

<footer>
  <div>© 2025 <strong>FoodOrder</strong> · Team 11, OOAD Mini Project, Sem 6 'A'</div>
</footer>
</body>
</html>

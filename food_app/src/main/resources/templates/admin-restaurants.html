<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin – Restaurants</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar">
  <a class="navbar-brand" href="#">🍽️ <span>Admin Panel</span></a>
  <div class="nav-links">
    <a th:href="@{/admin/dashboard}"   class="nav-btn">📊 Dashboard</a>
    <a th:href="@{/admin/restaurants}" class="nav-btn active">🏪 Restaurants</a>
    <a th:href="@{/admin/menu-items}"  class="nav-btn">🍱 Menu Items</a>
    <a th:href="@{/admin/orders}"      class="nav-btn">📦 Orders</a>
    <a th:href="@{/admin/users}"       class="nav-btn">👥 Users</a>
    <a th:href="@{/admin/coupons}"     class="nav-btn">🎟️ Coupons</a>
    <a th:href="@{/restaurants}"       class="nav-btn">👁️ View Site</a>
    <form th:action="@{/logout}" method="post" class="d-inline">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <button class="btn btn-outline-danger btn-sm">Logout</button>
    </form>
  </div>
</nav>
<div class="page">
  <div class="page-header">
    <div><div class="page-title">🏪 Manage Restaurants</div>
    <div class="page-subtitle">Add, edit, and delete restaurants</div></div>
  </div>

  <div th:if="${param.success}" style="margin-bottom:1rem;padding:.75rem 1rem;background:#dcfce7;border-radius:8px;color:#166534;">✅ Done successfully.</div>

  <div class="grid-2">
    <!-- ADD FORM -->
    <div class="card">
      <div class="card-header" style="background:var(--primary);color:#fff;">➕ Add New Restaurant</div>
      <div class="card-body">
        <form th:action="@{/admin/restaurants/add}" method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <div class="form-group">
            <label class="form-label">Name *</label>
            <input type="text" name="name" class="form-control" placeholder="e.g. Spice Garden" required>
          </div>
          <div class="form-group">
            <label class="form-label">Cuisine *</label>
            <input type="text" name="cuisine" class="form-control" placeholder="e.g. Indian, Italian" required>
          </div>
          <div class="form-group">
            <label class="form-label">Rating (0–5)</label>
            <input type="number" name="rating" class="form-control" placeholder="4.5" step="0.1" min="0" max="5" value="4.0">
          </div>
          <div class="form-group">
            <label class="form-label">Image URL</label>
            <input type="url" name="imageUrl" class="form-control" placeholder="https://...">
          </div>
          <div class="form-group" style="display:flex;align-items:center;gap:.5rem;">
            <input type="checkbox" name="open" id="openChk" value="true" checked style="width:18px;height:18px;">
            <label for="openChk" class="form-label" style="margin:0;">Currently Open</label>
          </div>
          <button type="submit" class="btn btn-primary btn-full">Add Restaurant</button>
        </form>
      </div>
    </div>

    <!-- TABLE -->
    <div class="card">
      <div class="card-header">All Restaurants
        <span class="badge badge-muted" style="margin-left:auto;" th:text="${#lists.size(restaurants)} + ' total'"></span>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>ID</th><th>Name</th><th>Cuisine</th><th>Rating</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody>
            <tr th:each="r : ${restaurants}">
              <td class="text-muted text-sm" th:text="${r.id}"></td>
              <td class="fw-bold" th:text="${r.name}"></td>
              <td class="text-sm" th:text="${r.cuisine}"></td>
              <td>★ <span th:text="${r.rating}"></span></td>
              <td>
                <span class="badge badge-success" th:if="${r.open}">Open</span>
                <span class="badge badge-danger"  th:unless="${r.open}">Closed</span>
              </td>
              <td style="display:flex;gap:.4rem;">
                <a th:href="@{/admin/restaurants/edit/{id}(id=${r.id})}" class="btn btn-sm btn-ghost">✏️ Edit</a>
                <form th:action="@{/admin/restaurants/delete/{id}(id=${r.id})}" method="post"
                      onsubmit="return confirm('Delete this restaurant and all its menu items?')">
                  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                  <button type="submit" class="btn btn-danger btn-sm">🗑 Delete</button>
                </form>
              </td>
            </tr>
            <tr th:if="${#lists.isEmpty(restaurants)}">
              <td colspan="6" class="text-center text-muted" style="padding:2rem;">No restaurants yet.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
</body>
</html>

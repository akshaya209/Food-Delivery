<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Payment Successful – FoodOrder</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar">
  <a class="navbar-brand" th:href="@{/restaurants}">🍽️ <span>FoodOrder</span></a>
  <div class="nav-links">
    <a th:href="@{/orders}" class="nav-btn">📦 Orders</a>
    <form th:action="@{/logout}" method="post" class="d-inline">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button class="btn btn-outline-danger btn-sm">Logout</button>
        </form>
  </div>
</nav>
<div class="page-sm">
  <div class="card mt-3" style="text-align:center;">
    <div class="card-body" style="padding:2.5rem 2rem;">
      <div class="result-icon">✅</div>
      <h2 class="fw-bold" style="font-size:1.5rem; color:var(--success); margin-bottom:0.5rem;">Payment Successful!</h2>
      <p class="text-muted mt-1 mb-2">
        ₹<span th:text="${#numbers.formatDecimal(payment.amount,1,'COMMA',2,'POINT')}"></span>
        paid via <strong th:text="${payment.paymentMethod}"></strong>
      </p>
      <div class="cart-summary mb-2" style="text-align:left;">
        <div class="summary-row"><span>Order #</span><span class="fw-bold" th:text="${payment.orderId}"></span></div>
        <div class="summary-row"><span>Method</span><span th:text="${payment.paymentMethod}"></span></div>
        <div class="summary-row"><span>Status</span><span class="badge badge-success" th:text="${payment.status}"></span></div>
      </div>
      <div style="display:flex; flex-direction:column; gap:0.5rem;">
        <a th:href="@{/orders/{id}/track(id=${payment.orderId})}"  class="btn btn-primary">📍 Track My Order</a>
        <a th:href="@{/orders/{id}/review(id=${payment.orderId})}" class="btn btn-outline">⭐ Leave a Review</a>
        <a th:href="@{/restaurants}"                               class="btn btn-ghost">🍴 Order More Food</a>
      </div>
    </div>
  </div>
</div>
<footer>
  <div>© 2025 <strong>FoodOrder</strong> · Team 11, OOAD Mini Project, Sem 6 'A'</div>
</footer>
</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login — FoodOrder</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card shadow p-4" style="width:400px">
        <h3 class="text-center mb-4">🍽️ FoodOrder Login</h3>

        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
        <div th:if="${param.registered}" class="alert alert-success">Registration successful! Please log in.</div>
        <div th:if="${param.logout}" class="alert alert-info">You have been logged out.</div>

        <!-- Spring Security processes POST /login automatically -->
        <form th:action="@{/login}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" required autofocus
                       placeholder="alice@demo.com">
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" required
                       placeholder="pass123">
            </div>
            <button type="submit" class="btn btn-primary w-100">Login</button>
        </form>
        <hr>
        <p class="text-center mb-0">No account? <a th:href="@{/register}">Register here</a></p>
        <div class="mt-3 p-2 bg-light rounded small text-muted">
            <strong>Demo accounts:</strong><br>
            Customer: alice@demo.com / pass123<br>
            Admin: admin@demo.com / admin
        </div>
    </div>
</div>
</body>
</html>

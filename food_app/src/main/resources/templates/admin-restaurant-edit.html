<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin – Edit Restaurant</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar">
  <a class="navbar-brand" href="#">🍽️ <span>Admin Panel</span></a>
  <div class="nav-links">
    <a th:href="@{/admin/dashboard}"   class="nav-btn">📊 Dashboard</a>
    <a th:href="@{/admin/restaurants}" class="nav-btn active">🏪 Restaurants</a>
    <a th:href="@{/admin/menu-items}"  class="nav-btn">🍱 Menu Items</a>
    <a th:href="@{/admin/orders}"      class="nav-btn">📦 Orders</a>
    <a th:href="@{/admin/users}"       class="nav-btn">👥 Users</a>
    <a th:href="@{/admin/coupons}"     class="nav-btn">🎟️ Coupons</a>
    <form th:action="@{/logout}" method="post" class="d-inline">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <button class="btn btn-outline-danger btn-sm">Logout</button>
    </form>
  </div>
</nav>
<div class="page">
  <div class="page-header">
    <div><div class="page-title">✏️ Edit Restaurant</div>
    <div class="page-subtitle" th:text="'Editing: ' + ${restaurant.name}"></div></div>
    <a th:href="@{/admin/restaurants}" class="btn btn-ghost">← Back</a>
  </div>
  <div style="max-width:600px;">
    <div class="card">
      <div class="card-header" style="background:var(--primary);color:#fff;">Edit Details</div>
      <div class="card-body">
        <form th:action="@{/admin/restaurants/edit/{id}(id=${restaurant.id})}" method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <div class="form-group">
            <label class="form-label">Name *</label>
            <input type="text" name="name" class="form-control" th:value="${restaurant.name}" required>
          </div>
          <div class="form-group">
            <label class="form-label">Cuisine *</label>
            <input type="text" name="cuisine" class="form-control" th:value="${restaurant.cuisine}" required>
          </div>
          <div class="form-group">
            <label class="form-label">Rating (0–5)</label>
            <input type="number" name="rating" class="form-control" th:value="${restaurant.rating}" step="0.1" min="0" max="5">
          </div>
          <div class="form-group">
            <label class="form-label">Image URL</label>
            <input type="url" name="imageUrl" class="form-control" th:value="${restaurant.imageUrl}">
          </div>
          <div class="form-group" style="display:flex;align-items:center;gap:.5rem;">
            <input type="checkbox" name="open" id="openChk" value="true"
                   th:checked="${restaurant.open}" style="width:18px;height:18px;">
            <label for="openChk" class="form-label" style="margin:0;">Currently Open</label>
          </div>
          <div style="display:flex;gap:.75rem;">
            <button type="submit" class="btn btn-primary" style="flex:1;">💾 Save Changes</button>
            <a th:href="@{/admin/restaurants}" class="btn btn-ghost" style="flex:1;text-align:center;">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
</body>
</html>

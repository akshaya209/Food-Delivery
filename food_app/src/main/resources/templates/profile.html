<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Profile — FoodOrder</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-3">
    <a class="navbar-brand" th:href="@{/restaurants}">🍽️ FoodOrder</a>
    <div class="d-flex gap-2">
        <a class="btn btn-outline-light btn-sm" th:href="@{/cart}">Cart</a>
        <a class="btn btn-outline-light btn-sm" th:href="@{/orders}">Orders</a>
        <form th:action="@{/logout}" method="post" class="d-inline">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button class="btn btn-outline-danger btn-sm">Logout</button>
        </form>
    </div>
</nav>
<div class="container mt-4" style="max-width:540px">
    <h3>My Profile</h3>
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div class="card p-4 shadow-sm">
        <form th:action="@{/profile/edit}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="mb-3">
                <label class="form-label">Email (read-only)</label>
                <input type="email" class="form-control" th:value="${user.email}" disabled>
            </div>
            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" name="name" class="form-control" th:value="${user.name}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Phone</label>
                <input type="tel" name="phone" class="form-control" th:value="${user.phone}" required>
            </div>
            <button type="submit" class="btn btn-primary">Save Changes</button>
        </form>
    </div>
</div>
</body>
</html>

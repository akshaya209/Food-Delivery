<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin – Edit Menu Item</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar">
  <a class="navbar-brand" href="#">🍽️ <span>Admin Panel</span></a>
  <div class="nav-links">
    <a th:href="@{/admin/dashboard}"   class="nav-btn">📊 Dashboard</a>
    <a th:href="@{/admin/restaurants}" class="nav-btn">🏪 Restaurants</a>
    <a th:href="@{/admin/menu-items}"  class="nav-btn active">🍱 Menu Items</a>
    <a th:href="@{/admin/orders}"      class="nav-btn">📦 Orders</a>
    <a th:href="@{/admin/users}"       class="nav-btn">👥 Users</a>
    <a th:href="@{/admin/coupons}"     class="nav-btn">🎟️ Coupons</a>
    <form th:action="@{/logout}" method="post" class="d-inline">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <button class="btn btn-outline-danger btn-sm">Logout</button>
    </form>
  </div>
</nav>
<div class="page">
  <div class="page-header">
    <div><div class="page-title">✏️ Edit Menu Item</div>
    <div class="page-subtitle" th:text="'Editing: ' + ${item.name}"></div></div>
    <a th:href="@{/admin/menu-items}" class="btn btn-ghost">← Back</a>
  </div>
  <div style="max-width:600px;">
    <div class="card">
      <div class="card-header" style="background:var(--primary);color:#fff;">Edit Item Details</div>
      <div class="card-body">
        <form th:action="@{/admin/menu-items/edit/{id}(id=${item.id})}" method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <div class="form-group">
            <label class="form-label">Item Name *</label>
            <input type="text" name="name" class="form-control" th:value="${item.name}" required>
          </div>
          <div class="form-group">
            <label class="form-label">Category *</label>
            <input type="text" name="category" class="form-control" th:value="${item.category}" required>
          </div>
          <div class="form-group">
            <label class="form-label">Price (₹) *</label>
            <input type="number" name="price" class="form-control" th:value="${item.price}" step="0.01" min="0" required>
          </div>
          <div class="form-group" style="display:flex;align-items:center;gap:.5rem;">
            <input type="checkbox" name="available" id="availChk" value="true"
                   th:checked="${item.available}" style="width:18px;height:18px;">
            <label for="availChk" class="form-label" style="margin:0;">Available</label>
          </div>
          <div style="display:flex;gap:.75rem;">
            <button type="submit" class="btn btn-primary" style="flex:1;">💾 Save Changes</button>
            <a th:href="@{/admin/menu-items}" class="btn btn-ghost" style="flex:1;text-align:center;">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
</body>
</html>

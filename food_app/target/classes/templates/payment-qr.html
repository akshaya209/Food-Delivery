<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Scan & Pay – FoodOrder</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar">
  <a class="navbar-brand" th:href="@{/restaurants}">🍽️ <span>FoodOrder</span></a>
  <div class="nav-links"><form th:action="@{/logout}" method="post" class="d-inline">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button class="btn btn-outline-danger btn-sm">Logout</button>
        </form></div>
</nav>

<div class="page-sm">
  <div class="card mt-3">
    <div class="card-header">📱 Scan & Pay via UPI</div>
    <div class="card-body qr-box">
      <p class="text-muted text-sm mb-2">Scan this QR code with any UPI app</p>
      <img 
  th:src="@{'https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=upi://pay?pa=demo@upi&pn=FoodOrder&am=' + ${amount}}"
  alt="UPI QR Code"
  style="width:220px; height:220px; border-radius:12px;"
>
      <p class="mt-2 text-muted text-sm">Google Pay · PhonePe · Paytm · BHIM</p>
      <form th:action="@{/orders/{id}/pay/confirm(id=${orderId})}" method="post" class="mt-2">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <button type="submit" class="btn btn-success btn-full">✅ I Have Paid</button>
      </form>
      <a th:href="@{/orders/{id}/pay(id=${orderId})}" class="btn btn-ghost btn-full mt-1">← Choose Different Method</a>
    </div>
  </div>
</div>
<footer>
  <div>© 2025 <strong>FoodOrder</strong> · Team 11, OOAD Mini Project, Sem 6 'A'</div>
</footer>
</body>
</html>

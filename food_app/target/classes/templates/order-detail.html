<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Order Detail – FoodOrder</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar">
  <a class="navbar-brand" th:href="@{/restaurants}">🍽️ <span>FoodOrder</span></a>
  <div class="nav-links">
    <a th:href="@{/orders}"  class="nav-btn">📦 Orders</a>
    <form th:action="@{/logout}" method="post" class="d-inline">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button class="btn btn-outline-danger btn-sm">Logout</button>
        </form>
  </div>
</nav>

<div class="page-md">
  <a th:href="@{/orders}" class="btn btn-ghost btn-sm mb-2">← Back to Orders</a>

  <div class="page-header">
    <div>
      <div class="page-title">Order #<span th:text="${order.id}"></span></div>
      <div class="page-subtitle" th:text="${#temporals.format(order.placedAt,'dd MMMM yyyy, hh:mm a')}"></div>
    </div>
    <span class="badge" th:classappend="'status-' + ${order.status}"
          style="font-size:0.9rem; padding:0.4rem 1rem;" th:text="${order.status}"></span>
  </div>

  <div class="grid-2">
    <!-- Items -->
    <div class="card">
      <div class="card-header">🍱 Items Ordered</div>
      <div th:each="item : ${order.items}" class="cart-item">
        <div>
          <div class="fw-bold text-sm" th:text="${item.itemName}"></div>
          <div class="text-muted text-sm">× <span th:text="${item.quantity}"></span></div>
        </div>
        <span class="fw-bold" style="color:var(--primary);">₹<span th:text="${#numbers.formatDecimal(item.price * item.quantity,1,'COMMA',2,'POINT')}"></span></span>
      </div>
      <div class="card-body">
        <div class="cart-summary">
          <div class="summary-row"><span>Subtotal</span><span>₹<span th:text="${#numbers.formatDecimal(order.subtotal,1,'COMMA',2,'POINT')}"></span></span></div>
          <div class="summary-row"><span>Tax</span><span>₹<span th:text="${#numbers.formatDecimal(order.tax,1,'COMMA',2,'POINT')}"></span></span></div>
          <div class="summary-row" th:if="${order.discount > 0}">
            <span style="color:var(--success);">Discount</span>
            <span style="color:var(--success);">–₹<span th:text="${#numbers.formatDecimal(order.discount,1,'COMMA',2,'POINT')}"></span></span>
          </div>
          <div class="summary-row total"><span>Total</span><span>₹<span th:text="${#numbers.formatDecimal(order.total,1,'COMMA',2,'POINT')}"></span></span></div>
        </div>
      </div>
    </div>

    <!-- Info & actions -->
    <div>
      <div class="card mb-2">
        <div class="card-header">📍 Delivery Info</div>
        <div class="card-body">
          <p class="text-sm text-muted mb-1">Deliver to:</p>
          <p class="fw-bold" th:text="${order.deliveryAddress}"></p>
        </div>
      </div>

      <div class="card">
        <div class="card-header">⚡ Actions</div>
        <div class="card-body d-flex gap-1" style="flex-direction:column;">
          <a th:if="${order.status == 'PENDING'}"
             th:href="@{/orders/{id}/pay(id=${order.id})}" class="btn btn-primary">💳 Pay Now</a>
          <a th:if="${order.status != 'PENDING'}"
             th:href="@{/orders/{id}/track(id=${order.id})}" class="btn btn-outline">📍 Track Order</a>
          <a th:if="${order.status == 'DELIVERED'}"
             th:href="@{/orders/{id}/review(id=${order.id})}" class="btn btn-ghost">⭐ Leave Review</a>
        </div>
      </div>
    </div>
  </div>
</div>

<footer>
  <div>© 2025 <strong>FoodOrder</strong> · Team 11, OOAD Mini Project, Sem 6 'A'</div>
</footer>
</body>
</html>

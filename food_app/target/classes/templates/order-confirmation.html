<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Order Confirmed – FoodOrder</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar">
  <a class="navbar-brand" th:href="@{/restaurants}">🍽️ <span>FoodOrder</span></a>
  <div class="nav-links">
    <a th:href="@{/orders}"  class="nav-btn">📦 My Orders</a>
    <form th:action="@{/logout}" method="post" class="d-inline">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button class="btn btn-outline-danger btn-sm">Logout</button>
        </form>
  </div>
</nav>

<div class="page-sm">
  <div class="card mt-3" style="text-align:center;">
    <div class="card-body" style="padding:2.5rem 2rem;">
      <div class="result-icon">🎉</div>
      <h2 class="fw-bold" style="font-size:1.6rem; margin-bottom:0.5rem;">Order Placed!</h2>
      <p class="text-muted mb-2">Your order <strong style="color:var(--primary);">#<span th:text="${order.id}"></span></strong> has been received.</p>

      <div class="cart-summary mb-2" style="text-align:left;">
        <div class="summary-row">
          <span>Status</span>
          <span class="badge" th:classappend="'status-' + ${order.status}" th:text="${order.status}"></span>
        </div>
        <div class="summary-row">
          <span>Deliver to</span>
          <span class="text-sm" style="max-width:200px; text-align:right;" th:text="${order.deliveryAddress}"></span>
        </div>
        <div class="summary-row total">
          <span>Total</span>
          <span>₹<span th:text="${#numbers.formatDecimal(order.total,1,'COMMA',2,'POINT')}"></span></span>
        </div>
      </div>

      <div class="d-flex gap-1" style="flex-direction:column;">
        <a th:href="@{/orders/{id}/pay(id=${order.id})}"   class="btn btn-primary">💳 Pay Now</a>
        <a th:href="@{/orders/{id}/track(id=${order.id})}" class="btn btn-outline">📍 Track Order</a>
        <a th:href="@{/restaurants}"                        class="btn btn-ghost">🍴 Order More Food</a>
      </div>
    </div>
  </div>
</div>

<footer>
  <div>© 2025 <strong>FoodOrder</strong> · Team 11, OOAD Mini Project, Sem 6 'A'</div>
</footer>
</body>
</html>

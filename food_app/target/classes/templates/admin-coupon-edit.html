<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin – Edit Coupon</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar">
  <a class="navbar-brand" href="#">🍽️ <span>Admin Panel</span></a>
  <div class="nav-links">
    <a th:href="@{/admin/dashboard}"   class="nav-btn">📊 Dashboard</a>
    <a th:href="@{/admin/restaurants}" class="nav-btn">🏪 Restaurants</a>
    <a th:href="@{/admin/menu-items}"  class="nav-btn">🍱 Menu Items</a>
    <a th:href="@{/admin/orders}"      class="nav-btn">📦 Orders</a>
    <a th:href="@{/admin/users}"       class="nav-btn">👥 Users</a>
    <a th:href="@{/admin/coupons}"     class="nav-btn active">🎟️ Coupons</a>
    <form th:action="@{/logout}" method="post" class="d-inline">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <button class="btn btn-outline-danger btn-sm">Logout</button>
    </form>
  </div>
</nav>
<div class="page">
  <div class="page-header">
    <div><div class="page-title">✏️ Edit Coupon</div>
    <div class="page-subtitle" th:text="'Code: ' + ${coupon.code}"></div></div>
    <a th:href="@{/admin/coupons}" class="btn btn-ghost">← Back</a>
  </div>
  <div style="max-width:600px;">
    <div class="card">
      <div class="card-header" style="background:var(--primary);color:#fff;">Edit Coupon Details</div>
      <div class="card-body">
        <form th:action="@{/admin/coupons/edit/{id}(id=${coupon.id})}" method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <div class="form-group">
            <label class="form-label">Code</label>
            <input type="text" class="form-control" th:value="${coupon.code}" disabled style="background:#f3f4f6;">
          </div>
          <div class="form-group">
            <label class="form-label">Discount (%)</label>
            <input type="number" name="discountPercent" class="form-control" th:value="${coupon.discountPercent}" step="0.1" min="1" max="100" required>
          </div>
          <div class="form-group">
            <label class="form-label">Minimum Order Amount (₹)</label>
            <input type="number" name="minOrderAmount" class="form-control" th:value="${coupon.minOrderAmount}" min="0" step="0.01" required>
          </div>
          <div class="form-group">
            <label class="form-label">Expiry Date</label>
            <input type="date" name="expiryDate" class="form-control" th:value="${coupon.expiryDate}" required>
          </div>
          <div class="form-group" style="display:flex;align-items:center;gap:.5rem;">
            <input type="checkbox" name="active" id="activeChk" value="true"
                   th:checked="${coupon.active}" style="width:18px;height:18px;">
            <label for="activeChk" class="form-label" style="margin:0;">Active</label>
          </div>
          <div style="display:flex;gap:.75rem;">
            <button type="submit" class="btn btn-primary" style="flex:1;">💾 Save Changes</button>
            <a th:href="@{/admin/coupons}" class="btn btn-ghost" style="flex:1;text-align:center;">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
</body>
</html>

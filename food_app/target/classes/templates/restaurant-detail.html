<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title th:text="${restaurant.name} + ' – FoodOrder'">Menu</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar">
  <a class="navbar-brand" th:href="@{/restaurants}">🍽️ <span>FoodOrder</span></a>
  <div class="nav-links">
    <a th:href="@{/cart}"    class="nav-btn">🛒 Cart</a>
    <a th:href="@{/orders}"  class="nav-btn">📦 Orders</a>
    <a th:href="@{/profile}" class="nav-btn">👤 Profile</a>
    <form th:action="@{/logout}" method="post" class="d-inline">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button class="btn btn-outline-danger btn-sm">Logout</button>
        </form>
  </div>
</nav>

<div class="page-md">
  <a th:href="@{/restaurants}" class="btn btn-ghost btn-sm mb-2">← Back to Restaurants</a>

  <!-- Restaurant header -->
  <div class="card mb-2">
    <div style="position:relative; overflow:hidden; border-radius:16px 16px 0 0;">
      <img th:src="${restaurant.imageUrl}" th:alt="${restaurant.name}"
           style="width:100%;height:220px;object-fit:cover; display:block;"
           onerror="this.src='https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=800'">
      <div style="position:absolute;bottom:0;left:0;right:0; padding:1.5rem; background:linear-gradient(to top, rgba(0,0,0,0.7), transparent);">
        <h2 style="color:#fff; font-size:1.6rem; font-weight:900; text-shadow:0 2px 8px rgba(0,0,0,0.4);" th:text="${restaurant.name}"></h2>
        <p style="color:rgba(255,255,255,0.8); font-size:0.9rem; margin-top:0.25rem;">🍜 <span th:text="${restaurant.cuisine}"></span></p>
      </div>
    </div>
    <div class="card-body" style="padding:1rem 1.4rem;">
      <div class="d-flex align-center gap-2" style="flex-wrap:wrap;">
        <div class="rating-row">
          <span class="star-rating" style="font-size:1.1rem;">★</span>
          <span class="fw-bold" th:text="${restaurant.rating}"></span>
          <span class="text-muted text-sm">/ 5.0</span>
        </div>
        <span class="badge badge-success" th:if="${restaurant.open}">🟢 Open Now</span>
        <span class="badge badge-danger"  th:unless="${restaurant.open}">🔴 Currently Closed</span>
      </div>
    </div>
  </div>

  <!-- Menu — Major use case: Adarsh L -->
  <div class="card mb-2">
    <div class="card-header">📋 Full Menu</div>

    <div th:if="${restaurant.menu != null and !#lists.isEmpty(restaurant.menu.menuItems)}">
      <div th:each="item : ${restaurant.menu.menuItems}" class="menu-item">
        <div>
          <div class="menu-item-name" th:text="${item.name}"></div>
          <div class="menu-item-cat">
            <span class="badge badge-muted" th:text="${item.category}"></span>
            <span class="badge badge-danger" th:unless="${item.available}">Unavailable</span>
          </div>
        </div>
        <div class="menu-item-actions">
          <span class="menu-item-price">₹<span th:text="${item.price}"></span></span>
          <a th:if="${item.available}"
             th:href="@{/cart/add(menuItemId=${item.id})}"
             class="btn btn-success btn-sm">+ Add</a>
          <button th:unless="${item.available}" class="btn btn-ghost btn-sm" disabled style="opacity:0.5;">Unavailable</button>
        </div>
      </div>
    </div>

    <div th:if="${restaurant.menu == null or #lists.isEmpty(restaurant.menu.menuItems)}" class="empty-state" style="padding:3rem 2rem;">
      <div class="empty-icon">📭</div>
      <h3>No menu items yet</h3>
      <p>Check back soon!</p>
    </div>
  </div>

  <div class="d-flex gap-1">
    <a th:href="@{/cart}" class="btn btn-primary">🛒 View Cart</a>
    <a th:href="@{/restaurants}" class="btn btn-ghost">← All Restaurants</a>
  </div>
</div>

<footer>
  <div class="footer-links">
    <a th:href="@{/restaurants}">Home</a>
    <a th:href="@{/cart}">Cart</a>
    <a th:href="@{/orders}">Orders</a>
  </div>
  <div>© 2025 <strong>FoodOrder</strong> · Team 11, OOAD Mini Project, Sem 6 'A'</div>
</footer>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Payment – FoodOrder</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar">
  <a class="navbar-brand" th:href="@{/restaurants}">🍽️ <span>FoodOrder</span></a>
  <div class="nav-links">
    <a th:href="@{/orders}" class="nav-btn">📦 Orders</a>
    <form th:action="@{/logout}" method="post" class="d-inline">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button class="btn btn-outline-danger btn-sm">Logout</button>
        </form>
  </div>
</nav>

<div class="page-sm">
  <div class="card mt-3">
    <div class="card-header">💳 Complete Payment</div>
    <div class="card-body">
      <p class="text-muted text-sm mb-2">Order #<span th:text="${orderId}"></span> · Select your payment method</p>

      <!-- Factory Pattern: UpiPayment / CardPayment / CodPayment — Akshaya Lakshmi Narasimhan -->
      <form th:action="@{/orders/{id}/pay(id=${orderId})}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="payment-methods mb-2">
          <label class="payment-option">
            <input type="radio" name="method" value="UPI" required>
            <div>
              <div class="payment-option-label">📱 UPI Payment</div>
              <div class="payment-option-desc">Google Pay, PhonePe, Paytm, BHIM</div>
            </div>
          </label>
          <label class="payment-option">
            <input type="radio" name="method" value="CARD">
            <div>
              <div class="payment-option-label">💳 Credit / Debit Card</div>
              <div class="payment-option-desc">Visa, Mastercard, RuPay accepted</div>
            </div>
          </label>
          <label class="payment-option">
            <input type="radio" name="method" value="COD">
            <div>
              <div class="payment-option-label">💵 Cash on Delivery</div>
              <div class="payment-option-desc">Pay when your order arrives at door</div>
            </div>
          </label>
        </div>
        <button type="submit" class="btn btn-primary btn-full" style="font-size:0.95rem;">Proceed to Pay →</button>
      </form>
      <a th:href="@{/orders}" class="btn btn-ghost btn-full mt-1">← Back to Orders</a>
    </div>
  </div>
</div>

<footer>
  <div>© 2025 <strong>FoodOrder</strong> · Team 11, OOAD Mini Project, Sem 6 'A'</div>
</footer>
</body>
</html>
